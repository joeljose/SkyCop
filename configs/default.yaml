# SkyCop — default scene configuration.
# Override any value via `load("default", overrides=["seed=7", "camera.fov=53"])`.

seed: 42  # NFR-07 reproducibility

carla:
  host: carla-server
  port: 2000
  tm_port: 8000
  map: Town10HD_Opt
  fixed_delta_seconds: 0.05  # SIM-04 · 20 FPS

scene:
  npc_count: 20          # reduced from 50 for v0a demo — less traffic blocking the reckless suspect
  suspect:
    speed_over_pct: -80.0   # FR-08 · negative = faster, see carla_caveats §9
    ignore_lights_pct: 100.0
    ignore_signs_pct: 100.0
    lane_change_pct: 50.0
    follow_dist_m: 1.0
    role_name: hero         # lets TM hybrid-physics anchor on the suspect

camera:
  width: 1280
  height: 720
  fov: 90
  altitude: 25.0             # fixed altitude fallback for scripts that don't adapt
  pitch: -75.0               # degrees. −75° balances parking-lot re-ID (wants −90°) with
                             # vehicle-class discrimination (needs side features). Parking-
                             # mode snap to −90° lands with the mission FSM (exp 10). See
                             # docs/design.md D-07.
